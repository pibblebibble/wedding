</head>
<body>

  <nav class="site-nav fade-in" style="--delay: 1000ms">
    <span class="nav-brand">J &amp; V</span>
    <span class="nav-back" style="cursor:default;">01 · 11 · 2026</span>
  </nav>

  <section class="hero">

    <!-- Floating sage leaves (decorative) -->
    <div class="leaves" aria-hidden="true">
      <span class="leaf leaf-1">
        <svg viewBox="0 0 32 32" fill="currentColor"><path d="M16 2c8 4 12 10 12 16 0 6-4 12-12 12C8 30 4 24 4 18 4 12 8 6 16 2zm0 3C10 9 7 14 7 18s3 9 9 9 9-5 9-9c0-5-3-10-9-13zm0 6c.4 0 .7.3.7.7v11.6a.7.7 0 0 1-1.4 0V11.7c0-.4.3-.7.7-.7z"/></svg>
      </span>
      <span class="leaf leaf-2">
        <svg viewBox="0 0 32 32" fill="currentColor"><path d="M16 2c8 4 12 10 12 16 0 6-4 12-12 12C8 30 4 24 4 18 4 12 8 6 16 2zm0 3C10 9 7 14 7 18s3 9 9 9 9-5 9-9c0-5-3-10-9-13zm0 6c.4 0 .7.3.7.7v11.6a.7.7 0 0 1-1.4 0V11.7c0-.4.3-.7.7-.7z"/></svg>
      </span>
      <span class="leaf leaf-3">
        <svg viewBox="0 0 32 32" fill="currentColor"><path d="M16 2c8 4 12 10 12 16 0 6-4 12-12 12C8 30 4 24 4 18 4 12 8 6 16 2zm0 3C10 9 7 14 7 18s3 9 9 9 9-5 9-9c0-5-3-10-9-13zm0 6c.4 0 .7.3.7.7v11.6a.7.7 0 0 1-1.4 0V11.7c0-.4.3-.7.7-.7z"/></svg>
      </span>
      <span class="leaf leaf-4">
        <svg viewBox="0 0 32 32" fill="currentColor"><path d="M16 2c8 4 12 10 12 16 0 6-4 12-12 12C8 30 4 24 4 18 4 12 8 6 16 2zm0 3C10 9 7 14 7 18s3 9 9 9 9-5 9-9c0-5-3-10-9-13zm0 6c.4 0 .7.3.7.7v11.6a.7.7 0 0 1-1.4 0V11.7c0-.4.3-.7.7-.7z"/></svg>
      </span>
      <span class="leaf leaf-5">
        <svg viewBox="0 0 32 32" fill="currentColor"><path d="M16 2c8 4 12 10 12 16 0 6-4 12-12 12C8 30 4 24 4 18 4 12 8 6 16 2zm0 3C10 9 7 14 7 18s3 9 9 9 9-5 9-9c0-5-3-10-9-13zm0 6c.4 0 .7.3.7.7v11.6a.7.7 0 0 1-1.4 0V11.7c0-.4.3-.7.7-.7z"/></svg>
      </span>
    </div>

    <div class="hero-inner">

      <p class="hero-eyebrow fade-in" style="--delay: 80ms">
        Together with our families
      </p>

      <h1 class="hero-names">
        <span data-letters>Jonathan</span>
        <span class="hero-amp">&amp;</span>
        <span data-letters>Vivien</span>
      </h1>

      <div class="ornament fade-in" style="--delay: 1700ms">
        <span class="ornament-glyph">❦</span>
      </div>

      <p class="lede fade-in" style="--delay: 1850ms">
        We are getting married, and would be honoured by your presence
        at our reception brunch.
      </p>

      <div class="hero-meta fade-in" style="--delay: 2000ms">
        <span>Sunday · 1 November 2026</span>
        <span class="hero-meta-divider"></span>
        <span>Blossom a Glassmansion</span>
        <span class="hero-meta-divider"></span>
        <span>10:30 AM – 1:30 PM</span>
      </div>

      <div class="hero-cta fade-in" style="--delay: 2200ms">
        <div class="hero-cta-pair">
          <a href="rsvp.html" class="btn">RSVP</a>
          <a href="details.html" class="btn btn-outline">Reception Details</a>
        </div>
      </div>

      <!-- Hover (or tap) to see them kiss — easter egg moment.
           Wrapped in fade-in so the entrance animation doesn't fight the
           photo's own rotation/hover transforms. -->
      <div class="fade-in" style="--delay: 2450ms">
        <div class="couple-photo"
             data-couple-photo
             tabindex="0"
             role="button"
             aria-label="A photo of Jonathan and Vivien — tap or hover for a sweet moment">
          <img class="couple-photo-img couple-photo-still"
               src="img/no-kiss.jpg" alt="" loading="lazy" aria-hidden="true" />
          <img class="couple-photo-img couple-photo-kiss"
               src="img/kiss.jpg" alt="" loading="lazy" aria-hidden="true" />
        </div>
      </div>

    </div>
  </section>

  <footer class="site-footer">
    <span>With love, J &amp; V</span>
  </footer>
